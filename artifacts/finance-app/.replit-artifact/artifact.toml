kind = "web"
previewPath = "/"
title = "Finance Manager"
version = "1.0.0"
id = "artifacts/finance-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18748
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/finance-app run dev"

[services.env]
PORT = "18748"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/finance-app", "run", "build"]
publicDir = "artifacts/finance-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
